name: ci-python

on:
  push:
    branches: [main]
    paths:
      - "services/analytics-svc/**"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "services/analytics-svc/**"
      - ".github/workflows/ci-python.yml"

env:
  IMAGE: ghcr.io/${{ github.repository }}/analytics-svc

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/analytics-svc
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest -q

  image:
    needs: lint-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t analytics-svc:ci services/analytics-svc
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: analytics-svc:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_LC=$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')
          docker tag analytics-svc:ci "${IMAGE_LC}:${GITHUB_SHA::7}"
          docker tag analytics-svc:ci "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${GITHUB_SHA::7}"
          docker push "${IMAGE_LC}:latest"
