name: ci-java

on:
  push:
    branches: [main]
    paths:
      - "services/shortener-api/**"
      - ".github/workflows/ci-java.yml"
  pull_request:
    paths:
      - "services/shortener-api/**"
      - ".github/workflows/ci-java.yml"

env:
  IMAGE: ghcr.io/${{ github.repository }}/shortener-api

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/shortener-api
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and run integration tests
        run: mvn -B verify

  image:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t shortener-api:ci services/shortener-api
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: shortener-api:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE_LC=$(echo "${IMAGE}" | tr '[:upper:]' '[:lower:]')
          docker tag shortener-api:ci "${IMAGE_LC}:${GITHUB_SHA::7}"
          docker tag shortener-api:ci "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${GITHUB_SHA::7}"
          docker push "${IMAGE_LC}:latest"
